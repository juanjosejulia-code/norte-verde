<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>El Mercadito · Norte Verde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #1a0e0a;
  --bg2:     #261510;
  --bg3:     #321c12;
  --oro:     #c9a84c;
  --oro-lt:  #e8c97a;
  --crema:   #f0e8d8;
  --crema-dk:#c8bca8;
  --gris:    #7a6a58;
  --rojo:    #8b1a1a;
  --verde:   #1a4a2a;
  --ff-d:    'Fraunces', Georgia, serif;
  --ff-m:    'DM Mono', monospace;
  --r:       10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--crema);
  font-family: var(--ff-m);
  font-size: 14px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── HEADER ── */
.hdr {
  background: var(--bg2);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hdr-title {
  font-family: var(--ff-d);
  font-size: 18px;
  font-weight: 300;
  color: var(--oro-lt);
}
.hdr-title strong { font-weight: 700; }
.turno-info {
  font-size: 11px;
  color: var(--gris);
  text-align: right;
}
.turno-info span { color: var(--crema-dk); }

/* ── NOMBRE VENDEDOR ── */
.vendedor-bar {
  background: var(--bg2);
  padding: 10px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 10px;
}
.vendedor-bar label { font-size: 11px; color: var(--gris); }
.vendedor-input {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--crema);
  font-family: var(--ff-m);
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 6px;
  width: 140px;
  outline: none;
}
.vendedor-input:focus { border-color: rgba(201,168,76,0.5); }

/* ── MAIN ── */
.main {
  flex: 1;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── BUSCAR PRODUCTO ── */
.buscar-wrap { position: relative; }
.buscar-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gris);
  font-size: 16px;
  pointer-events: none;
}
.buscar {
  width: 100%;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--crema);
  font-family: var(--ff-m);
  font-size: 14px;
  padding: 12px 14px 12px 38px;
  border-radius: var(--r);
  outline: none;
  transition: border-color .2s;
}
.buscar::placeholder { color: var(--gris); }
.buscar:focus { border-color: rgba(201,168,76,0.5); }

/* ── LISTA PRODUCTOS ── */
.productos-grid {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 340px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--bg3) transparent;
}
.prod-item {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--r);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.prod-item:hover, .prod-item:active { background: var(--bg3); border-color: rgba(201,168,76,0.3); }
.prod-item.sel { border-color: var(--oro); background: rgba(201,168,76,0.08); }
.prod-sku {
  font-size: 9px;
  background: rgba(201,168,76,0.15);
  color: var(--oro);
  padding: 2px 6px;
  border-radius: 3px;
  flex-shrink: 0;
}
.prod-body { flex: 1; min-width: 0; }
.prod-nombre { font-size: 13px; color: var(--crema); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prod-sub { font-size: 11px; color: var(--gris); margin-top: 1px; }
.prod-stock {
  font-size: 11px;
  color: var(--gris);
  text-align: right;
  flex-shrink: 0;
}
.prod-stock.low { color: #ff9070; }
.prod-precio {
  font-family: var(--ff-d);
  font-size: 16px;
  font-weight: 700;
  color: var(--oro-lt);
  text-align: right;
  flex-shrink: 0;
  white-space: nowrap;
}
.empty-prod {
  text-align: center;
  padding: 32px 16px;
  color: var(--gris);
  font-size: 13px;
}

/* ── VENTA SELECCIONADA ── */
.venta-card {
  background: var(--bg2);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: var(--r);
  padding: 16px;
  display: none;
}
.venta-card.visible { display: block; }
.vc-label { font-size: 10px; color: var(--gris); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px; }
.vc-producto {
  font-family: var(--ff-d);
  font-size: 17px;
  font-weight: 300;
  color: var(--crema);
  margin-bottom: 14px;
  line-height: 1.3;
}
.vc-producto strong { font-weight: 700; color: var(--oro-lt); }
.vc-row { display: flex; gap: 10px; margin-bottom: 10px; }
.vc-field { flex: 1; }
.vc-input-label { font-size: 11px; color: var(--gris); margin-bottom: 5px; }
.vc-input {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--crema);
  font-family: var(--ff-d);
  font-size: 22px;
  font-weight: 700;
  padding: 10px 14px;
  border-radius: var(--r);
  outline: none;
  text-align: center;
  transition: border-color .2s;
}
.vc-input:focus { border-color: rgba(201,168,76,0.6); }
.precio-sugerido {
  font-size: 11px;
  color: var(--gris);
  text-align: center;
  margin-top: 4px;
}
.precio-sugerido span { color: var(--oro); }
.vc-total {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: var(--r);
  padding: 12px 16px;
  margin-top: 4px;
}
.vc-total-label { font-size: 12px; color: var(--gris); }
.vc-total-num {
  font-family: var(--ff-d);
  font-size: 28px;
  font-weight: 700;
  color: var(--oro-lt);
}

/* ── BOTÓN VENTA ── */
.btn-vender {
  width: 100%;
  background: var(--verde);
  border: 1px solid rgba(100,200,130,0.3);
  color: var(--crema);
  font-family: var(--ff-d);
  font-size: 18px;
  font-weight: 700;
  padding: 16px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 0.02em;
  margin-top: 10px;
}
.btn-vender:hover, .btn-vender:active { background: #1f5a32; }
.btn-vender:disabled { background: var(--bg3); color: var(--gris); border-color: transparent; cursor: not-allowed; }

/* ── TICKETS ── */
.tickets-section { margin-top: 4px; }
.tickets-title {
  font-size: 10px;
  color: var(--gris);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.ticket-list { display: flex; flex-direction: column; gap: 5px; max-height: 220px; overflow-y: auto; }
.ticket {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 7px;
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.ticket-nombre { flex: 1; font-size: 12px; color: var(--crema-dk); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ticket-detalle { font-size: 11px; color: var(--gris); flex-shrink: 0; }
.ticket-total { font-family: var(--ff-d); font-size: 14px; font-weight: 700; color: var(--oro); flex-shrink: 0; min-width: 70px; text-align: right; }
.ticket-hora { font-size: 10px; color: var(--gris); flex-shrink: 0; }

/* ── FOOTER TOTALES ── */
.footer-totales {
  background: var(--bg2);
  border-top: 1px solid rgba(201,168,76,0.15);
  padding: 10px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.ft-left { font-size: 11px; color: var(--gris); }
.ft-left span { color: var(--crema); font-weight: 500; }
.ft-total {
  font-family: var(--ff-d);
  font-size: 20px;
  font-weight: 700;
  color: var(--oro-lt);
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--verde);
  border: 1px solid rgba(100,200,130,0.4);
  color: var(--crema);
  font-family: var(--ff-m);
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── CONFIG INICIAL ── */
.setup-screen {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px;
  z-index: 500;
}
.setup-screen.hidden { display: none; }
.setup-title { font-family: var(--ff-d); font-size: 28px; font-weight: 300; color: var(--oro-lt); margin-bottom: 8px; text-align: center; }
.setup-sub { font-size: 13px; color: var(--gris); margin-bottom: 28px; text-align: center; }
.setup-label { font-size: 11px; color: var(--gris); margin-bottom: 6px; }
.setup-input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--crema);
  font-family: var(--ff-m);
  font-size: 13px;
  padding: 12px 14px;
  border-radius: var(--r);
  outline: none;
  margin-bottom: 12px;
}
.setup-input:focus { border-color: rgba(201,168,76,0.5); }
.btn-setup {
  width: 100%;
  background: var(--verde);
  border: 1px solid rgba(100,200,130,0.3);
  color: var(--crema);
  font-family: var(--ff-d);
  font-size: 16px;
  font-weight: 700;
  padding: 14px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all .2s;
  margin-top: 4px;
}
.btn-setup:hover { background: #1f5a32; }
</style>
</head>
<body>

<!-- SETUP -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-title">El Mercadito</div>
  <div class="setup-sub">Norte Verde · Panel de Venta</div>
  <div style="width:100%;max-width:340px">
    <div class="setup-label">URL del Apps Script (Web App)</div>
    <input class="setup-input" id="setupUrl" placeholder="https://script.google.com/macros/s/…/exec">
    <div class="setup-label">Tu nombre (vendedor)</div>
    <input class="setup-input" id="setupNombre" placeholder="Ej: María">
    <button class="btn-setup" onclick="iniciarSesion()">Iniciar sesión →</button>
  </div>
</div>

<!-- APP -->
<header class="hdr">
  <div class="hdr-title">El <strong>Mercadito</strong></div>
  <div class="turno-info">
    <div id="turnoHora">—</div>
    <div>Vendedor: <span id="turnoNombre">—</span></div>
  </div>
</header>

<div class="vendedor-bar">
  <label>Vendedor:</label>
  <input class="vendedor-input" id="vendedorInput" placeholder="Tu nombre">
</div>

<div class="main">

  <!-- BUSCAR -->
  <div class="buscar-wrap">
    <span class="buscar-icon">⌕</span>
    <input class="buscar" id="buscarProd" placeholder="Buscar producto por nombre o SKU…" oninput="filtrarProductos()" autocomplete="off">
  </div>

  <!-- PRODUCTOS -->
  <div class="productos-grid" id="prodGrid">
    <div class="empty-prod">Cargando productos…</div>
  </div>

  <!-- VENTA -->
  <div class="venta-card" id="ventaCard">
    <div class="vc-label">Registrando venta</div>
    <div class="vc-producto" id="vcProducto">—</div>
    <div class="vc-row">
      <div class="vc-field">
        <div class="vc-input-label">Cantidad</div>
        <input class="vc-input" id="vcCantidad" type="number" min="1" max="99" value="1" oninput="actualizarTotal()">
      </div>
      <div class="vc-field">
        <div class="vc-input-label">Precio ($)</div>
        <input class="vc-input" id="vcPrecio" type="number" min="0" oninput="actualizarTotal()">
        <div class="precio-sugerido" id="precioSugerido"></div>
      </div>
    </div>
    <div class="vc-total">
      <div class="vc-total-label">Total a cobrar</div>
      <div class="vc-total-num" id="vcTotal">$0</div>
    </div>
    <button class="btn-vender" id="btnVender" onclick="registrarVenta()">
      ✓ Registrar venta
    </button>
  </div>

  <!-- TICKETS DEL TURNO -->
  <div class="tickets-section" id="ticketsSection" style="display:none">
    <div class="tickets-title">Ventas del turno</div>
    <div class="ticket-list" id="ticketList"></div>
  </div>

</div>

<footer class="footer-totales">
  <div class="ft-left">
    Turno: <span id="ftBotellas">0</span> bot. vendidas
  </div>
  <div class="ft-total" id="ftTotal">$0</div>
</footer>

<div class="toast" id="toast"></div>

<script>
// ── ESTADO ────────────────────────────────────────────────────
let _cfg     = JSON.parse(localStorage.getItem('nv_merc') || '{}');
let _prods   = [];
let _sel     = null;
let _tickets = [];
let _turnoTotal = 0;
let _turnoBots  = 0;

// ── SETUP ─────────────────────────────────────────────────────
function iniciarSesion() {
  const url    = document.getElementById('setupUrl').value.trim();
  const nombre = document.getElementById('setupNombre').value.trim();
  if (!url || !nombre) { _toast('Completa todos los campos'); return; }
  _cfg = { url, nombre };
  localStorage.setItem('nv_merc', JSON.stringify(_cfg));
  document.getElementById('setupScreen').classList.add('hidden');
  _iniciar();
}

function _iniciar() {
  if (!_cfg.url) { return; }
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('vendedorInput').value = _cfg.nombre || '';
  document.getElementById('turnoNombre').textContent = _cfg.nombre || '—';
  _actualizarReloj();
  setInterval(_actualizarReloj, 30000);
  cargarProductos();
}

function _actualizarReloj() {
  document.getElementById('turnoHora').textContent =
    new Date().toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
}

// ── CARGAR PRODUCTOS ──────────────────────────────────────────
async function cargarProductos() {
  const el = document.getElementById('prodGrid');
  el.innerHTML = '<div class="empty-prod">Cargando…</div>';
  try {
    const res  = await fetch(_cfg.url + '?accion=stock');
    const data = await res.json();
    _prods = (data.items || []).filter(i => Number(i.mercadito) > 0 || Number(i.total) > 0);
    _renderProductos(_prods);
  } catch(e) {
    el.innerHTML = '<div class="empty-prod">Error cargando productos.<br>Verifica la URL del script.</div>';
  }
}

function filtrarProductos() {
  const q = document.getElementById('buscarProd').value.toLowerCase();
  const f = q ? _prods.filter(p =>
    (p.nombre||'').toLowerCase().includes(q) ||
    (p.sku||'').toLowerCase().includes(q)
  ) : _prods;
  _renderProductos(f);
}

function _renderProductos(items) {
  const el = document.getElementById('prodGrid');
  if (!items.length) {
    el.innerHTML = '<div class="empty-prod">Sin productos</div>';
    return;
  }
  el.innerHTML = items.map(p => {
    const stock = Number(p.mercadito) || 0;
    const isLow = stock > 0 && stock <= 5;
    const isSel = _sel && _sel.sku === p.sku;
    return `<div class="prod-item${isSel ? ' sel' : ''}" onclick="seleccionar('${p.sku}')">
      <span class="prod-sku">${p.sku}</span>
      <div class="prod-body">
        <div class="prod-nombre">${p.nombre}</div>
        <div class="prod-sub">${p.productor||''} ${p.valle ? '· ' + p.valle : ''}</div>
      </div>
      <div>
        <div class="prod-precio">$${_fmt(p.precioVenta || 0)}</div>
        <div class="prod-stock${isLow ? ' low' : ''}">${stock} en merc.</div>
      </div>
    </div>`;
  }).join('');
}

// ── SELECCIÓN Y VENTA ─────────────────────────────────────────
function seleccionar(sku) {
  _sel = _prods.find(p => p.sku === sku);
  if (!_sel) return;
  filtrarProductos(); // re-render para marcar seleccionado

  const card = document.getElementById('ventaCard');
  card.classList.add('visible');
  document.getElementById('vcProducto').innerHTML =
    `<strong>${_sel.nombre}</strong>${_sel.productor ? ' · ' + _sel.productor : ''}`;
  document.getElementById('vcCantidad').value = 1;

  // Precio desde MAESTRO_SKU — siempre actualizado
  const precioVenta = Number(_sel.precioVenta) || 0;
  document.getElementById('vcPrecio').value = precioVenta > 0 ? precioVenta : '';
  document.getElementById('precioSugerido').innerHTML =
    precioVenta > 0
      ? `precio lista: <span>$${_fmt(precioVenta)}</span>`
      : '<span style="color:#ff9070">sin precio en maestro</span>';

  actualizarTotal();

  // Scroll al card
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function actualizarTotal() {
  const cant   = parseInt(document.getElementById('vcCantidad').value) || 0;
  const precio = parseFloat(document.getElementById('vcPrecio').value) || 0;
  const total  = cant * precio;
  document.getElementById('vcTotal').textContent = '$' + _fmt(total);
  document.getElementById('btnVender').disabled = (cant <= 0 || precio <= 0 || !_sel);
}

async function registrarVenta() {
  if (!_sel) return;
  const vendedor = document.getElementById('vendedorInput').value.trim() || _cfg.nombre || 'vendedor';
  const cant     = parseInt(document.getElementById('vcCantidad').value) || 0;
  const precio   = parseFloat(document.getElementById('vcPrecio').value) || 0;
  if (cant <= 0 || precio <= 0) { _toast('Completa cantidad y precio'); return; }

  const btn = document.getElementById('btnVender');
  btn.disabled = true;
  btn.textContent = 'Registrando…';

  // Llama al endpoint venta_directa — registra en Sheets y descuenta stock
  try {
    const params = new URLSearchParams({
      accion:   'venta_directa',
      sku:      _sel.sku,
      cantidad: cant,
      precio:   precio,
      usuario:  vendedor,
    });
    const res  = await fetch(_cfg.url + '?' + params.toString());
    const data = await res.json();

    if (data.ok) {
      _registrarTicketLocal(_sel, cant, precio, vendedor);
      _toast('✓ ' + cant + ' × ' + _sel.nombre.split(' ')[0] + ' registrado');

      // Actualiza stock local restando lo vendido
      const idx = _prods.findIndex(p => p.sku === _sel.sku);
      if (idx >= 0) {
        _prods[idx].mercadito = Math.max(0, (Number(_prods[idx].mercadito) || 0) - cant);
        _prods[idx].total     = Math.max(0, (Number(_prods[idx].total)     || 0) - cant);
      }
    } else {
      _toast('⚠ Error: ' + (data.error || 'intenta de nuevo'));
      btn.disabled = false;
      btn.textContent = '✓ Registrar venta';
      return;
    }
  } catch(e) {
    _toast('⚠ Sin conexión — venta no registrada');
    btn.disabled = false;
    btn.textContent = '✓ Registrar venta';
    return;
  }

  // Reset formulario
  document.getElementById('ventaCard').classList.remove('visible');
  document.getElementById('buscarProd').value = '';
  _sel = null;
  filtrarProductos();

  btn.disabled = false;
  btn.textContent = '✓ Registrar venta';
}

function _registrarTicketLocal(prod, cant, precio, vendedor) {
  const total = cant * precio;
  const hora  = new Date().toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
  _tickets.unshift({ prod, cant, precio, total, hora, vendedor });
  _turnoTotal += total;
  _turnoBots  += cant;

  // Actualizar footer
  document.getElementById('ftBotellas').textContent = _turnoBots;
  document.getElementById('ftTotal').textContent    = '$' + _fmt(_turnoTotal);

  // Renderizar tickets
  const sec = document.getElementById('ticketsSection');
  const lst = document.getElementById('ticketList');
  sec.style.display = 'block';
  lst.innerHTML = _tickets.map(t =>
    `<div class="ticket">
      <div>
        <div class="ticket-nombre">${t.prod.nombre}</div>
        <div class="ticket-detalle">${t.cant} × $${_fmt(t.precio)}</div>
      </div>
      <div class="ticket-hora">${t.hora}</div>
      <div class="ticket-total">$${_fmt(t.total)}</div>
    </div>`
  ).join('');
}

// ── UTIL ──────────────────────────────────────────────────────
function _fmt(n) { return Number(n||0).toLocaleString('es-CL'); }

function _toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── INIT ──────────────────────────────────────────────────────
if (_cfg.url && _cfg.nombre) {
  _iniciar();
} else {
  // Mostrar setup
  const url = localStorage.getItem('nv_merc');
  if (!url) document.getElementById('setupScreen').style.display = 'flex';
  else _iniciar();
}
</script>
</body>
</html>
