<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>El Mercadito · Norte Verde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #1a0e0a;
  --bg2:     #261510;
  --bg3:     #321c12;
  --oro:     #c9a84c;
  --oro-lt:  #e8c97a;
  --crema:   #f0e8d8;
  --crema-dk:#c8bca8;
  --gris:    #7a6a58;
  --verde:   #1a4a2a;
  --ff-d:    'Fraunces', Georgia, serif;
  --ff-m:    'DM Mono', monospace;
  --r:       10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--crema);
  font-family: var(--ff-m);
  font-size: 14px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── HEADER ── */
.hdr {
  background: var(--bg2);
  border-bottom: 1px solid rgba(201,168,76,0.15);
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.hdr-title { font-family: var(--ff-d); font-size: 18px; font-weight: 300; color: var(--oro-lt); }
.hdr-title strong { font-weight: 700; }
.turno-info { font-size: 11px; color: var(--gris); text-align: right; }
.turno-info span { color: var(--crema-dk); }

/* ── VENDEDOR ── */
.vendedor-bar {
  background: var(--bg2);
  padding: 8px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.vendedor-bar label { font-size: 11px; color: var(--gris); }
.vendedor-input {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--crema);
  font-family: var(--ff-m);
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 6px;
  width: 140px;
  outline: none;
}

/* ── MAIN ── */
.main { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

/* ── BUSCAR ── */
.buscar-wrap { position: relative; flex-shrink: 0; }
.buscar {
  width: 100%;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--crema);
  font-family: var(--ff-m);
  font-size: 14px;
  padding: 11px 14px 11px 36px;
  border-radius: var(--r);
  outline: none;
  transition: border-color .2s;
}
.buscar::placeholder { color: var(--gris); }
.buscar:focus { border-color: rgba(201,168,76,0.5); }
.buscar-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--gris); pointer-events: none; }

/* ── PRODUCTOS ── */
.productos-grid {
  display: flex;
  flex-direction: column;
  gap: 5px;
  max-height: 300px;
  overflow-y: auto;
  flex-shrink: 0;
}
.prod-item {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--r);
  padding: 9px 13px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.prod-item:active { background: var(--bg3); border-color: rgba(201,168,76,0.3); }
.prod-item.en-carro { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.06); }
.prod-sku { font-size: 9px; background: rgba(201,168,76,0.15); color: var(--oro); padding: 2px 5px; border-radius: 3px; flex-shrink: 0; }
.prod-body { flex: 1; min-width: 0; }
.prod-nombre { font-size: 13px; color: var(--crema); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prod-sub { font-size: 10px; color: var(--gris); margin-top: 1px; }
.prod-derecha { text-align: right; flex-shrink: 0; }
.prod-precio { font-family: var(--ff-d); font-size: 15px; font-weight: 700; color: var(--oro-lt); white-space: nowrap; }
.prod-stock { font-size: 10px; color: var(--gris); margin-top: 1px; }
.prod-stock.low { color: #ff9070; }
.prod-en-carro { font-size: 10px; color: var(--oro); margin-top: 1px; }
.empty-prod { text-align: center; padding: 24px; color: var(--gris); font-size: 13px; }

/* ── MODAL CANTIDAD ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,6,4,0.85);
  display: flex;
  align-items: flex-end;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.modal-overlay.visible { opacity: 1; pointer-events: all; }
.modal-card {
  background: var(--bg2);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 16px 16px 0 0;
  padding: 20px 20px 32px;
  width: 100%;
  transform: translateY(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.visible .modal-card { transform: translateY(0); }
.modal-nombre { font-family: var(--ff-d); font-size: 16px; font-weight: 700; color: var(--oro-lt); margin-bottom: 3px; }
.modal-sub { font-size: 11px; color: var(--gris); margin-bottom: 16px; }
.modal-row { display: flex; gap: 10px; margin-bottom: 12px; }
.modal-field { flex: 1; }
.modal-label { font-size: 11px; color: var(--gris); margin-bottom: 5px; }
.modal-input {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  color: var(--crema);
  font-family: var(--ff-d);
  font-size: 26px;
  font-weight: 700;
  padding: 10px 14px;
  border-radius: var(--r);
  outline: none;
  text-align: center;
  transition: border-color .2s;
}
.modal-input:focus { border-color: rgba(201,168,76,0.6); }
.precio-ref { font-size: 11px; color: var(--gris); text-align: center; margin-top: 3px; }
.precio-ref span { color: var(--oro); }
.modal-subtotal {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(201,168,76,0.07);
  border-radius: var(--r);
  padding: 10px 14px;
  margin-bottom: 14px;
}
.modal-subtotal-label { font-size: 12px; color: var(--gris); }
.modal-subtotal-num { font-family: var(--ff-d); font-size: 22px; font-weight: 700; color: var(--oro-lt); }
.modal-btns { display: flex; gap: 8px; }
.btn-cancelar {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--gris);
  font-family: var(--ff-m);
  font-size: 13px;
  padding: 13px;
  border-radius: var(--r);
  cursor: pointer;
}
.btn-agregar {
  flex: 2;
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--oro-lt);
  font-family: var(--ff-d);
  font-size: 16px;
  font-weight: 700;
  padding: 13px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all .2s;
}
.btn-agregar:active { background: rgba(201,168,76,0.25); }

/* ── CARRITO ── */
.carro-section { flex-shrink: 0; }
.carro-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}
.carro-title { font-size: 10px; color: var(--gris); letter-spacing: 0.06em; text-transform: uppercase; }
.carro-limpiar { font-size: 11px; color: var(--gris); background: none; border: none; cursor: pointer; padding: 2px 6px; }
.carro-items { display: flex; flex-direction: column; gap: 5px; }
.carro-item {
  background: var(--bg2);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 8px;
  padding: 9px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.carro-nombre { flex: 1; font-size: 12px; color: var(--crema); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.carro-detalle { font-size: 11px; color: var(--gris); flex-shrink: 0; }
.carro-subtotal { font-family: var(--ff-d); font-size: 14px; font-weight: 700; color: var(--oro); flex-shrink: 0; min-width: 70px; text-align: right; }
.carro-quitar { background: none; border: none; color: var(--gris); font-size: 16px; cursor: pointer; padding: 2px 4px; flex-shrink: 0; line-height: 1; }
.carro-quitar:active { color: #ff6060; }
.carro-vacio { text-align: center; padding: 14px; color: var(--gris); font-size: 12px; }

/* ── TOTAL Y COBRAR ── */
.cobrar-section { flex-shrink: 0; }
.total-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 4px;
  border-top: 1px solid rgba(201,168,76,0.15);
  margin-bottom: 10px;
}
.total-label { font-size: 13px; color: var(--gris); }
.total-num { font-family: var(--ff-d); font-size: 30px; font-weight: 700; color: var(--oro-lt); }
.btn-cobrar {
  width: 100%;
  background: var(--verde);
  border: 1px solid rgba(100,200,130,0.3);
  color: var(--crema);
  font-family: var(--ff-d);
  font-size: 20px;
  font-weight: 700;
  padding: 16px;
  border-radius: var(--r);
  cursor: pointer;
  transition: all .2s;
}
.btn-cobrar:disabled { background: var(--bg3); color: var(--gris); border-color: transparent; cursor: not-allowed; }
.btn-cobrar:not(:disabled):active { background: #1f5a32; }

/* ── TICKETS ── */
.tickets-section { flex-shrink: 0; }
.tickets-title { font-size: 10px; color: var(--gris); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
.ticket-list { display: flex; flex-direction: column; gap: 5px; max-height: 200px; overflow-y: auto; }
.ticket {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 7px;
  padding: 8px 12px;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.ticket-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 3px; }
.ticket-hora { font-size: 10px; color: var(--gris); }
.ticket-total-num { font-family: var(--ff-d); font-size: 15px; font-weight: 700; color: var(--oro); }
.ticket-items { font-size: 11px; color: var(--crema-dk); line-height: 1.6; }

/* ── FOOTER ── */
.footer-totales {
  background: var(--bg2);
  border-top: 1px solid rgba(201,168,76,0.15);
  padding: 10px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.ft-left { font-size: 11px; color: var(--gris); }
.ft-left span { color: var(--crema); font-weight: 500; }
.ft-total { font-family: var(--ff-d); font-size: 20px; font-weight: 700; color: var(--oro-lt); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--verde);
  border: 1px solid rgba(100,200,130,0.4);
  color: var(--crema);
  font-family: var(--ff-m);
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 20px;
  opacity: 0;
  transition: all .3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SETUP ── */
.setup-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px; z-index: 500;
}
.setup-screen.hidden { display: none; }
.setup-title { font-family: var(--ff-d); font-size: 28px; font-weight: 300; color: var(--oro-lt); margin-bottom: 8px; text-align: center; }
.setup-sub { font-size: 13px; color: var(--gris); margin-bottom: 28px; text-align: center; }
.setup-label { font-size: 11px; color: var(--gris); margin-bottom: 6px; }
.setup-input {
  width: 100%; background: var(--bg2); border: 1px solid rgba(255,255,255,0.12);
  color: var(--crema); font-family: var(--ff-m); font-size: 13px;
  padding: 12px 14px; border-radius: var(--r); outline: none; margin-bottom: 12px;
}
.btn-setup {
  width: 100%; background: var(--verde); border: 1px solid rgba(100,200,130,0.3);
  color: var(--crema); font-family: var(--ff-d); font-size: 16px; font-weight: 700;
  padding: 14px; border-radius: var(--r); cursor: pointer;
}
</style>
</head>
<body>

<!-- SETUP -->
<div class="setup-screen" id="setupScreen">
  <div class="setup-title">El Mercadito</div>
  <div class="setup-sub">Norte Verde · Panel de Venta</div>
  <div style="width:100%;max-width:340px">
    <div class="setup-label">URL del Apps Script (Web App)</div>
    <input class="setup-input" id="setupUrl" placeholder="https://script.google.com/macros/s/…/exec">
    <div class="setup-label">Tu nombre (vendedor)</div>
    <input class="setup-input" id="setupNombre" placeholder="Ej: María">
    <button class="btn-setup" onclick="iniciarSesion()">Iniciar sesión →</button>
  </div>
</div>

<!-- MODAL CANTIDAD -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModal(event)">
  <div class="modal-card">
    <div class="modal-nombre" id="modalNombre">—</div>
    <div class="modal-sub" id="modalSub">—</div>
    <div class="modal-row">
      <div class="modal-field">
        <div class="modal-label">Cantidad</div>
        <input class="modal-input" id="modalCant" type="number" min="1" value="1" oninput="actualizarModalTotal()">
      </div>
      <div class="modal-field">
        <div class="modal-label">Precio ($)</div>
        <input class="modal-input" id="modalPrecio" type="number" min="0" oninput="actualizarModalTotal()">
        <div class="precio-ref" id="modalPrecioRef"></div>
      </div>
    </div>
    <div class="modal-subtotal">
      <div class="modal-subtotal-label">Subtotal</div>
      <div class="modal-subtotal-num" id="modalSubtotal">$0</div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-agregar" id="btnAgregar" onclick="agregarAlCarro()">+ Agregar</button>
    </div>
  </div>
</div>

<!-- APP -->
<header class="hdr">
  <div class="hdr-title">El <strong>Mercadito</strong></div>
  <div class="turno-info">
    <div id="turnoHora">—</div>
    <div>Vendedor: <span id="turnoNombre">—</span></div>
  </div>
</header>

<div class="vendedor-bar">
  <label>Vendedor:</label>
  <input class="vendedor-input" id="vendedorInput" placeholder="Tu nombre">
</div>

<div class="main">

  <!-- BUSCAR -->
  <div class="buscar-wrap">
    <span class="buscar-icon">⌕</span>
    <input class="buscar" id="buscarProd" placeholder="Buscar producto…" oninput="filtrarProductos()" autocomplete="off">
  </div>

  <!-- PRODUCTOS -->
  <div class="productos-grid" id="prodGrid">
    <div class="empty-prod">Cargando productos…</div>
  </div>

  <!-- CARRITO -->
  <div class="carro-section">
    <div class="carro-header">
      <div class="carro-title">Carro de compra</div>
      <button class="carro-limpiar" onclick="limpiarCarro()">Limpiar</button>
    </div>
    <div class="carro-items" id="carroItems">
      <div class="carro-vacio">Sin productos agregados</div>
    </div>
  </div>

  <!-- TOTAL Y COBRAR -->
  <div class="cobrar-section">
    <div class="total-row">
      <div class="total-label">Total a cobrar</div>
      <div class="total-num" id="totalNum">$0</div>
    </div>
    <button class="btn-cobrar" id="btnCobrar" onclick="cobrar()" disabled>
      ✓ Cobrar y registrar venta
    </button>
  </div>

  <!-- TICKETS DEL TURNO -->
  <div class="tickets-section" id="ticketsSection" style="display:none">
    <div class="tickets-title">Ventas del turno</div>
    <div class="ticket-list" id="ticketList"></div>
  </div>

</div>

<footer class="footer-totales">
  <div class="ft-left">Turno: <span id="ftBotellas">0</span> bot.</div>
  <div class="ft-total" id="ftTotal">$0</div>
</footer>

<div class="toast" id="toast"></div>

<script>
// ── ESTADO ────────────────────────────────────────────────────
let _cfg      = JSON.parse(localStorage.getItem('nv_merc') || '{}');
let _prods    = [];
let _carro    = [];   // [{sku, nombre, cantidad, precio, subtotal}]
let _selSku   = null; // SKU del modal abierto
let _tickets  = [];
let _turnoTotal = 0;
let _turnoBots  = 0;

// ── SETUP ─────────────────────────────────────────────────────
function iniciarSesion() {
  const url    = document.getElementById('setupUrl').value.trim();
  const nombre = document.getElementById('setupNombre').value.trim();
  if (!url || !nombre) { _toast('Completa todos los campos'); return; }
  _cfg = { url, nombre };
  localStorage.setItem('nv_merc', JSON.stringify(_cfg));
  document.getElementById('setupScreen').classList.add('hidden');
  _iniciar();
}

function _iniciar() {
  document.getElementById('setupScreen').classList.add('hidden');
  document.getElementById('vendedorInput').value = _cfg.nombre || '';
  document.getElementById('turnoNombre').textContent = _cfg.nombre || '—';
  _actualizarReloj();
  setInterval(_actualizarReloj, 30000);
  cargarProductos();
}

function _actualizarReloj() {
  document.getElementById('turnoHora').textContent =
    new Date().toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
}

// ── PRODUCTOS ─────────────────────────────────────────────────
async function cargarProductos() {
  try {
    const res  = await fetch(_cfg.url + '?accion=stock');
    const data = await res.json();
    _prods = (data.items || []);
    filtrarProductos();
  } catch(e) {
    document.getElementById('prodGrid').innerHTML =
      '<div class="empty-prod">Error cargando. Verifica la URL.</div>';
  }
}

function filtrarProductos() {
  const q = document.getElementById('buscarProd').value.toLowerCase();
  const f = q
    ? _prods.filter(p => (p.nombre||'').toLowerCase().includes(q) || (p.sku||'').toLowerCase().includes(q))
    : _prods;
  _renderProductos(f);
}

function _renderProductos(items) {
  const el = document.getElementById('prodGrid');
  if (!items.length) { el.innerHTML = '<div class="empty-prod">Sin resultados</div>'; return; }

  el.innerHTML = items.map(p => {
    const stock   = Number(p.mercadito) || 0;
    const isLow   = stock > 0 && stock <= 5;
    const enCarro = _carro.find(c => c.sku === p.sku);
    return `<div class="prod-item${enCarro ? ' en-carro' : ''}" onclick="abrirModal('${p.sku}')">
      <span class="prod-sku">${p.sku}</span>
      <div class="prod-body">
        <div class="prod-nombre">${p.nombre}</div>
        <div class="prod-sub">${p.productor||''}${p.valle ? ' · ' + p.valle : ''}</div>
      </div>
      <div class="prod-derecha">
        <div class="prod-precio">$${_fmt(p.precioVenta||0)}</div>
        <div class="prod-stock${isLow?' low':''}">
          ${stock > 0 ? stock + ' disp.' : '<span style="color:#ff6060">sin stock</span>'}
        </div>
        ${enCarro ? `<div class="prod-en-carro">✓ ${enCarro.cantidad} en carro</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── MODAL ─────────────────────────────────────────────────────
function abrirModal(sku) {
  const prod = _prods.find(p => p.sku === sku);
  if (!prod) return;
  _selSku = sku;

  // Si ya está en el carro, precarga los valores existentes
  const enCarro = _carro.find(c => c.sku === sku);

  document.getElementById('modalNombre').textContent  = prod.nombre;
  document.getElementById('modalSub').textContent     = (prod.productor||'') + (prod.valle ? ' · ' + prod.valle : '');
  document.getElementById('modalCant').value          = enCarro ? enCarro.cantidad : 1;
  document.getElementById('modalPrecio').value        = enCarro ? enCarro.precio : (prod.precioVenta || '');
  document.getElementById('modalPrecioRef').innerHTML = prod.precioVenta
    ? `lista: <span>$${_fmt(prod.precioVenta)}</span>` : '';
  document.getElementById('btnAgregar').textContent   = enCarro ? '✓ Actualizar' : '+ Agregar';

  actualizarModalTotal();
  document.getElementById('modalOverlay').classList.add('visible');
  setTimeout(() => document.getElementById('modalCant').focus(), 300);
}

function cerrarModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('visible');
  _selSku = null;
}

function actualizarModalTotal() {
  const cant   = parseInt(document.getElementById('modalCant').value)   || 0;
  const precio = parseFloat(document.getElementById('modalPrecio').value) || 0;
  document.getElementById('modalSubtotal').textContent = '$' + _fmt(cant * precio);
}

function agregarAlCarro() {
  const prod   = _prods.find(p => p.sku === _selSku);
  if (!prod) return;
  const cant   = parseInt(document.getElementById('modalCant').value)    || 0;
  const precio = parseFloat(document.getElementById('modalPrecio').value) || 0;
  if (cant <= 0 || precio <= 0) { _toast('Completa cantidad y precio'); return; }

  // Si ya existe en el carro, actualiza; si no, agrega
  const idx = _carro.findIndex(c => c.sku === _selSku);
  const item = { sku: prod.sku, nombre: prod.nombre, cantidad: cant, precio, subtotal: cant * precio };
  if (idx >= 0) {
    _carro[idx] = item;
  } else {
    _carro.push(item);
  }

  document.getElementById('modalOverlay').classList.remove('visible');
  document.getElementById('buscarProd').value = '';
  _selSku = null;

  _renderCarro();
  filtrarProductos();
  _toast('Agregado al carro');
}

// ── CARRITO ───────────────────────────────────────────────────
function _renderCarro() {
  const el    = document.getElementById('carroItems');
  const total = _carro.reduce((s, i) => s + i.subtotal, 0);

  if (!_carro.length) {
    el.innerHTML = '<div class="carro-vacio">Sin productos agregados</div>';
    document.getElementById('totalNum').textContent = '$0';
    document.getElementById('btnCobrar').disabled  = true;
    return;
  }

  el.innerHTML = _carro.map((item, idx) =>
    `<div class="carro-item">
      <div class="carro-nombre">${item.nombre}</div>
      <div class="carro-detalle">${item.cantidad} × $${_fmt(item.precio)}</div>
      <div class="carro-subtotal">$${_fmt(item.subtotal)}</div>
      <button class="carro-quitar" onclick="quitarDelCarro(${idx})">×</button>
    </div>`
  ).join('');

  document.getElementById('totalNum').textContent   = '$' + _fmt(total);
  document.getElementById('btnCobrar').disabled     = false;
}

function quitarDelCarro(idx) {
  _carro.splice(idx, 1);
  _renderCarro();
  filtrarProductos();
}

function limpiarCarro() {
  _carro = [];
  _renderCarro();
  filtrarProductos();
}

// ── COBRAR ────────────────────────────────────────────────────
async function cobrar() {
  if (!_carro.length) return;
  const vendedor = document.getElementById('vendedorInput').value.trim() || _cfg.nombre || 'vendedor';
  const btn      = document.getElementById('btnCobrar');
  btn.disabled   = true;
  btn.textContent = 'Registrando…';

  let errores = 0;
  const itemsRegistrados = [];

  // Registra cada ítem del carro por separado
  for (const item of _carro) {
    try {
      const params = new URLSearchParams({
        accion:   'venta_directa',
        sku:      item.sku,
        cantidad: item.cantidad,
        precio:   item.precio,
        usuario:  vendedor,
      });
      const res  = await fetch(_cfg.url + '?' + params.toString());
      const data = await res.json();
      if (data.ok) {
        itemsRegistrados.push(item);
        // Descuenta del stock local
        const p = _prods.find(p => p.sku === item.sku);
        if (p) {
          p.mercadito = Math.max(0, (Number(p.mercadito)||0) - item.cantidad);
          p.total     = Math.max(0, (Number(p.total)||0)     - item.cantidad);
        }
      } else {
        errores++;
      }
    } catch(e) {
      errores++;
    }
  }

  if (errores === 0) {
    // Registra el ticket del turno
    const total    = _carro.reduce((s, i) => s + i.subtotal, 0);
    const botellas = _carro.reduce((s, i) => s + i.cantidad, 0);
    _registrarTicket([..._carro], total, botellas, vendedor);
    _toast('✓ Venta registrada — $' + _fmt(total));
    _carro = [];
    _renderCarro();
    filtrarProductos();
  } else {
    _toast('⚠ ' + errores + ' producto(s) no registrado(s) — reintenta');
  }

  btn.disabled    = false;
  btn.textContent = '✓ Cobrar y registrar venta';
}

function _registrarTicket(items, total, botellas, vendedor) {
  _turnoTotal += total;
  _turnoBots  += botellas;
  const hora   = new Date().toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});

  _tickets.unshift({ items, total, hora, vendedor });

  document.getElementById('ftBotellas').textContent = _turnoBots;
  document.getElementById('ftTotal').textContent    = '$' + _fmt(_turnoTotal);

  const sec = document.getElementById('ticketsSection');
  const lst = document.getElementById('ticketList');
  sec.style.display = 'block';

  lst.innerHTML = _tickets.map(t => `
    <div class="ticket">
      <div class="ticket-top">
        <div class="ticket-hora">${t.hora} · ${t.vendedor}</div>
        <div class="ticket-total-num">$${_fmt(t.total)}</div>
      </div>
      <div class="ticket-items">${t.items.map(i => `${i.cantidad} × ${i.nombre.split(' ').slice(0,3).join(' ')} — $${_fmt(i.subtotal)}`).join('<br>')}</div>
    </div>`
  ).join('');
}

// ── UTIL ──────────────────────────────────────────────────────
function _fmt(n) { return Number(n||0).toLocaleString('es-CL'); }
function _toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}

// ── INIT ──────────────────────────────────────────────────────
if (_cfg.url && _cfg.nombre) {
  _iniciar();
}
</script>
